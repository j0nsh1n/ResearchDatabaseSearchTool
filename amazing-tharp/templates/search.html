{% extends "base.html" %}
{% block title %}Search - Literature Research Aide{% endblock %}
{% block content %}
<section class="page-header">
    <h1>Search for Similar Articles</h1>
    <p class="subtitle">Enter a study description or use PICO format to find similar research articles.</p>
</section>

<section class="card">
    <div class="input-method-toggle">
        <label class="radio-label">
            <input type="radio" name="input_method" value="text" checked> Text Input
        </label>
        <label class="radio-label">
            <input type="radio" name="input_method" value="pico"> PICO Format
        </label>
    </div>

    <div id="text-input-panel">
        <textarea id="query-text" placeholder="Enter your study description or research question..." rows="4"></textarea>
    </div>

    <div id="pico-input-panel" style="display:none;">
        <div class="pico-grid">
            <div class="form-group">
                <label>Population</label>
                <input type="text" id="pico-population" placeholder="e.g., Adults with type 2 diabetes">
            </div>
            <div class="form-group">
                <label>Intervention</label>
                <input type="text" id="pico-intervention" placeholder="e.g., Metformin treatment">
            </div>
            <div class="form-group">
                <label>Comparison</label>
                <input type="text" id="pico-comparison" placeholder="e.g., Placebo or standard care">
            </div>
            <div class="form-group">
                <label>Outcome</label>
                <input type="text" id="pico-outcome" placeholder="e.g., Glycemic control">
            </div>
        </div>
    </div>
</section>

<section class="card">
    <div class="param-row">
        <div class="param-group">
            <label>Results: <strong id="topk-display">10</strong></label>
            <input type="range" id="top-k" min="1" max="50" value="10">
        </div>
        <div class="param-group">
            <label>Sort by</label>
            <select id="sort-by">
                <option value="similarity">Similarity Score</option>
                <option value="year">Publication Year (newest)</option>
                <option value="journal">Journal Name (A-Z)</option>
                <option value="title">Title (A-Z)</option>
            </select>
        </div>
        <div class="param-group">
            <label>Sources</label>
            <div class="source-selector">
                <label class="radio-label"><input type="checkbox" name="search-source" value="pubmed" checked> PubMed</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="europepmc" checked> Europe PMC</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="clinicaltrials" checked> ClinicalTrials.gov</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="openalex" checked> OpenAlex</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="arxiv" checked> arXiv</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="semanticscholar" checked> Semantic Scholar</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="eric" checked> ERIC</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="zenodo" checked> Zenodo</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="crossref" checked> CrossRef</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="doaj" checked> DOAJ</label>
                <label class="radio-label"><input type="checkbox" name="search-source" value="nasa_ads" checked> NASA ADS</label>
            </div>
            <div class="help-text" id="source-availability-hint" style="margin-top:0.4rem;"></div>
        </div>
    </div>
    <button id="search-btn" class="btn btn-primary btn-block">Search</button>
</section>

<section id="results-section" style="display:none;">
    <div class="results-header">
        <h2>Results: <span id="result-count">0</span> articles found</h2>
        <div class="export-row">
            <button id="export-csv" class="btn btn-secondary btn-sm">Download CSV</button>
            <button id="export-txt" class="btn btn-secondary btn-sm">Download Text</button>
        </div>
    </div>
    <div id="results-list"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/search.js"></script>
{% endblock %}
