<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Literature Research Aide</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">Literature Research Aide</div>
        <div class="auth-subtitle">v2.2.1</div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Log In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="/register">Create one</a></p>
    </div>
</body>
</html>
