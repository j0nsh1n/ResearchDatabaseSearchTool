name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest \
            ruff \
            numpy \
            scikit-learn \
            fastapi \
            httpx \
            jinja2 \
            biopython \
            plotly \
            tqdm \
            slowapi \
            PyJWT \
            "passlib[bcrypt]" \
            "bcrypt<4.1" \
            python-multipart \
            requests \
            python-dotenv

      - name: Ruff (critical + unused imports + import order)
        run: ruff check .

      - name: Run tests
        env:
          SECRET_KEY: ci-test-key
          DEBUG: "true"
        run: python -m pytest -q
