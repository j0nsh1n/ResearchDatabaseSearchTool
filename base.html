<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Literature Search Tool{% endblock %}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Health Literature Search</div>
        <div class="nav-links">
            <a href="search.html" class="nav-link {% if active_page == 'search' %}active{% endif %}">Search</a>
            <a href="data-management.html" class="nav-link {% if active_page == 'data_management' %}active{% endif %}">Data Management</a>
            <a href="statistics.html" class="nav-link {% if active_page == 'statistics' %}active{% endif %}">Statistics</a>
        </div>
        <div class="nav-stats">
            <span class="stat-badge" id="nav-article-count">-- articles</span>
        </div>
    </nav>

    <main class="container">
        <div id="notification-area"></div>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Health Literature Search &amp; Similarity Tool</p>
    </footer>

    <script src="common.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
