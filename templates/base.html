<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Literature Search Tool{% endblock %}</title>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-brand-icon">HL</div>
            Health Literature Search
        </div>
        <div class="nav-links">
            <a href="/search" class="nav-link {% if active_page == 'search' %}active{% endif %}">Search</a>
            <a href="/data-management" class="nav-link {% if active_page == 'data_management' %}active{% endif %}">Data Management</a>
            <a href="/statistics" class="nav-link {% if active_page == 'statistics' %}active{% endif %}">Statistics</a>
        </div>
        <div class="nav-stats">
            <span class="stat-badge" id="nav-article-count">-- articles</span>
        </div>
    </nav>

    <main class="container">
        <div id="notification-area"></div>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>Health Literature Search &amp; Similarity Tool</span>
            <span class="footer-divider"></span>
            <span>PubMed &middot; Europe PMC &middot; ClinicalTrials.gov &middot; OpenAlex</span>
        </div>
    </footer>

    <script src="/static/js/common.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
