{% extends "base.html" %}
{% block title %}Statistics - Literature Search Tool{% endblock %}
{% block content %}
<section class="page-header">
    <h1>Database Statistics</h1>
</section>

<section class="stats-cards">
    <div class="stat-card">
        <div class="stat-value" id="stat-total">--</div>
        <div class="stat-label">Total Articles</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="stat-embeddings">--</div>
        <div class="stat-label">With Embeddings</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="stat-clusters">--</div>
        <div class="stat-label">Clusters</div>
    </div>
</section>

<section class="card" id="source-breakdown-section" style="display:none;">
    <h2>Articles by Source</h2>
    <div id="source-breakdown"></div>
</section>

<section class="card">
    <h2>Duplicate Detection</h2>
    <div class="form-row">
        <div class="param-group">
            <label>Similarity Threshold: <strong id="threshold-display">0.95</strong></label>
            <input type="range" id="threshold" min="0.80" max="0.99" step="0.01" value="0.95">
        </div>
    </div>
    <button id="detect-btn" class="btn btn-primary">Detect Duplicates</button>
    <div id="duplicates-status" class="status-indicator"></div>
    <div id="duplicates-list"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/statistics.js"></script>
{% endblock %}
